<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSW Sports Betting Predictor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --dark: #0f172a;
            --dark-surface: #1e293b;
            --text: #f9fafb;
            --text-muted: #9ca3af;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: var(--dark-surface); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-value.green { color: var(--success); }
        .stat-value.red { color: var(--danger); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
        
        .section { background: var(--dark-surface); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .section-title { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .game-card { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 12px; }
        .teams { display: flex; align-items: center; gap: 20px; flex: 1; }
        .team { font-weight: 600; font-size: 1rem; }
        .vs { color: var(--text-muted); font-size: 0.9rem; }
        .game-time { color: var(--text-muted); font-size: 0.85rem; }
        
        .prediction { display: flex; align-items: center; gap: 12px; }
        .pick { padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; }
        .pick.home { background: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        .pick.away { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        
        .confidence { display: flex; align-items: center; gap: 4px; }
        .stars { color: var(--warning); }
        
        .result-btns { display: flex; gap: 8px; }
        .result-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .result-btn.win { background: var(--success); color: white; }
        .result-btn.loss { background: var(--danger); color: white; }
        .result-btn.pending { background: var(--text-muted); color: white; }
        
        .bet-record { display: flex; gap: 24px; }
        .record-item { text-align: center; }
        .record-value { font-size: 1.5rem; font-weight: 700; }
        .record-label { font-size: 0.75rem; color: var(--text-muted); }
        
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .game-card { flex-direction: column; gap: 12px; }
            .teams { justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 JSW Sports Predictor</h1>
            <div id="roi" class="stat-value green">+0.0%</div>
        </div>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalBets">0</div>
                <div class="stat-label">Total Bets</div>
            </div>
            <div class="stat-card">
                <div class="stat-value green" id="wins">0</div>
                <div class="stat-label">Wins</div>
            </div>
            <div class="stat-card">
                <div class="stat-value red" id="losses">0</div>
                <div class="stat-label">Losses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="units">0.0</div>
                <div class="stat-label">Units</div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title"><i class="fas fa-fire"></i> Today's Best Bets</h2>
            <div id="betsList"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title"><i class="fas fa-history"></i> Recent Results</h2>
            <div class="bet-record">
                <div class="record-item">
                    <div class="record-value" id="winRate">0%</div>
                    <div class="record-label">Win Rate</div>
                </div>
                <div class="record-item">
                    <div class="record-value" id="avgOdds">0</div>
                    <div class="record-label">Avg Odds</div>
                </div>
                <div class="record-item">
                    <div class="record-value" id="streak">0</div>
                    <div class="record-label">Current Streak</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const STORAGE_KEY = 'jsw_sports_bets';
        
        // Sample today's games
        const todaysGames = [
            { id: 1, home: 'Lakers', away: 'Celtics', time: '7:30 PM', sport: 'NBA', homeOdds: -110, awayOdds: -110 },
            { id: 2, home: 'Chiefs', away: 'Bills', time: '4:25 PM', sport: 'NFL', homeOdds: -150, awayOdds: +130 },
            { id: 3, home: 'Yankees', away: 'Red Sox', time: '1:05 PM', sport: 'MLB', homeOdds: -135, awayOdds: +115 },
            { id: 4, home: 'Man City', away: 'Arsenal', time: '11:30 AM', sport: 'Soccer', homeOdds: -120, awayOdds: +300 },
            { id: 5, home: 'Nuggets', away: 'Warriors', time: '10:00 PM', sport: 'NBA', homeOdds: -105, awayOdds: -115 }
        ];
        
        // Predictions (generated)
        const predictions = [
            { gameId: 1, pick: 'home', confidence: 4, reasoning: 'Home court advantage, Lakers won last 3 at home' },
            { gameId: 2, pick: 'away', confidence: 3, reasoning: 'Value on underdog, Bills defense strong' },
            { gameId: 3, pick: 'home', confidence: 5, reasoning: 'Yankees dominate at home, best pitcher on mound' },
            { gameId: 4, pick: 'home', confidence: 4, reasoning: 'Man City in form, home field advantage' },
            { gameId: 5, pick: 'away', confidence: 3, reasoning: 'Warriors hungry, undervalue' }
        ];
        
        function getBets() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }
        
        function saveBets(bets) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));
        }
        
        function renderBets() {
            const bets = getBets();
            const list = document.getElementById('betsList');
            
            list.innerHTML = todaysGames.map(game => {
                const pred = predictions.find(p => p.gameId === game.id);
                const bet = bets.find(b => b.gameId === game.id);
                const pickTeam = pred.pick === 'home' ? game.home : game.away;
                const pickClass = pred.pick === 'home' ? 'home' : 'away';
                const stars = '★'.repeat(pred.confidence) + '☆'.repeat(5 - pred.confidence);
                
                let resultButtons = '';
                if (bet && bet.result) {
                    resultButtons = `<span class="result-btn ${bet.result}">${bet.result.toUpperCase()}</span>`;
                } else {
                    resultButtons = `
                        <button class="result-btn win" onclick="recordResult(${game.id}, 'win')">WIN</button>
                        <button class="result-btn loss" onclick="recordResult(${game.id}, 'loss')">LOSS</button>
                    `;
                }
                
                return `
                    <div class="game-card">
                        <div class="teams">
                            <div class="team">${game.home}</div>
                            <div class="vs">vs</div>
                            <div class="team">${game.away}</div>
                        </div>
                        <div class="game-time">${game.sport} • ${game.time}</div>
                        <div class="prediction">
                            <span class="pick ${pickClass}">${pickTeam}</span>
                            <span class="confidence stars">${stars}</span>
                        </div>
                        <div class="result-btns">${resultButtons}</div>
                    </div>
                `;
            }).join('');
            
            updateStats();
        }
        
        function recordResult(gameId, result) {
            const game = todaysGames.find(g => g.id === gameId);
            const pred = predictions.find(p => p.gameId === gameId);
            const betTeam = pred.pick === 'home' ? game.home : game.away;
            const odds = pred.pick === 'home' ? game.homeOdds : game.awayOdds;
            
            // Calculate units (standard 1 unit bet)
            let units = 0;
            if (result === 'win') {
                units = odds < 0 ? (100 / Math.abs(odds)) : (odds / 100);
            } else {
                units = -1;
            }
            
            const bets = getBets();
            bets.push({
                gameId,
                game: `${game.home} vs ${game.away}`,
                pick: betTeam,
                odds,
                result,
                units,
                date: new Date().toISOString()
            });
            
            saveBets(bets);
            renderBets();
        }
        
        function updateStats() {
            const bets = getBets();
            const completed = bets.filter(b => b.result);
            
            const wins = completed.filter(b => b.result === 'win').length;
            const losses = completed.filter(b => b.result === 'loss').length;
            const total = completed.length;
            const units = completed.reduce((sum, b) => sum + b.units, 0);
            const roi = total > 0 ? (units / total) * 100 : 0;
            
            document.getElementById('totalBets').textContent = total;
            document.getElementById('wins').textContent = wins;
            document.getElementById('losses').textContent = losses;
            document.getElementById('units').textContent = units.toFixed(1);
            
            const roiEl = document.getElementById('roi');
            roiEl.textContent = (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
            roiEl.className = 'stat-value ' + (roi >= 0 ? 'green' : 'red');
            
            document.getElementById('winRate').textContent = total > 0 ? Math.round((wins / total) * 100) + '%' : '0%';
            document.getElementById('avgOdds').textContent = total > 0 ? (completed.reduce((s, b) => s + Math.abs(b.odds), 0) / total).toFixed(0) : '0';
            
            // Calculate streak
            let streak = 0;
            for (let i = completed.length - 1; i >= 0; i--) {
                if (completed[i].result === 'win') streak++;
                else break;
            }
            if (streak === 0) {
                for (let i = completed.length - 1; i >= 0; i--) {
                    if (completed[i].result === 'loss') streak--;
                    else break;
                }
            }
            document.getElementById('streak').textContent = streak;
        }
        
        renderBets();
    </script>
</body>
</html>
