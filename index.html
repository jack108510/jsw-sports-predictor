<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetPredictor - Sports Betting Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --bg-elevated: #21262d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-purple: #a371f7;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border-color: #30363d;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }
        
        .header { background: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 700; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .nav-tabs { display: flex; gap: 4px; background: var(--bg-elevated); padding: 4px; border-radius: 8px; }
        .nav-tab { padding: 8px 16px; border: none; background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .nav-tab:hover { color: var(--text-primary); }
        .nav-tab.active { background: var(--accent-blue); color: white; }
        .header-stats { display: flex; gap: 24px; }
        .stat-item { text-align: right; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
        .stat-value.positive { color: var(--accent-green); }
        .stat-value.negative { color: var(--accent-red); }

        .main { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .filter-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
        .filter-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .prediction-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; transition: transform 0.2s, box-shadow 0.2s; }
        .prediction-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .sport-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-elevated); border-radius: 4px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .sport-badge.nba { color: #ff8c00; }
        .sport-badge.nfl { color: #00ff87; }
        .sport-badge.mlb { color: #4a90d9; }
        .sport-badge.nhl { color: #00a0e0; }
        .sport-badge.ncaa { color: #ff4444; }
        .game-time { font-size: 12px; color: var(--text-muted); }
        .matchup { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .team-logo { width: 48px; height: 48px; background: var(--bg-elevated); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .team-name { font-size: 14px; font-weight: 600; }
        .vs { font-size: 12px; color: var(--text-muted); padding: 0 8px; }
        .pick-section { background: var(--bg-elevated); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
        .pick-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .pick-value { font-size: 16px; font-weight: 600; color: var(--accent-blue); }
        .pick-odds { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-secondary); }
        .confidence-bar { height: 6px; background: var(--bg-elevated); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .confidence-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .confidence-fill.high { background: var(--accent-green); }
        .confidence-fill.medium { background: var(--accent-yellow); }
        .confidence-fill.low { background: var(--accent-red); }
        .confidence-text { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }
        .card-actions { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-win { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .btn-win:hover { background: var(--accent-green); color: white; }
        .btn-loss { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }
        .btn-loss:hover { background: var(--accent-red); color: white; }
        .btn-reset { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-reset:hover { color: var(--text-primary); }
        .result-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .result-badge.win { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
        .result-badge.loss { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }
        .result-badge.push { background: rgba(139, 148, 158, 0.15); color: var(--text-secondary); }

        .best-bets-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .best-bets-header h2 { font-size: 24px; font-weight: 700; }
        .star-rating { display: flex; gap: 2px; }
        .star { color: var(--accent-yellow); font-size: 18px; }
        .star.empty { color: var(--text-muted); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card-icon { width: 48px; height: 48px; margin: 0 auto 12px; background: var(--bg-elevated); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .stat-card-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .stat-card-label { font-size: 13px; color: var(--text-secondary); }

        .record-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .record-title { font-size: 18px; font-weight: 600; }
        .record-main { display: flex; justify-content: center; align-items: center; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
        .record-display { text-align: center; }
        .record-wins { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; color: var(--accent-green); }
        .record-losses { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; color: var(--accent-red); }
        .record-divider { font-size: 32px; color: var(--text-muted); }
        .win-rate-ring { width: 120px; height: 120px; position: relative; }
        .win-rate-ring svg { transform: rotate(-90deg); }
        .win-rate-ring circle { fill: none; stroke-width: 8; }
        .win-rate-ring .bg { stroke: var(--bg-elevated); }
        .win-rate-ring .progress { stroke: var(--accent-blue); stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
        .win-rate-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .win-rate-number { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
        .win-rate-label { font-size: 11px; color: var(--text-muted); }
        .streaks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .streak-item { text-align: center; padding: 16px; background: var(--bg-elevated); border-radius: 8px; }
        .streak-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .streak-value.win { color: var(--accent-green); }
        .streak-value.loss { color: var(--accent-red); }
        .streak-label { font-size: 12px; color: var(--text-secondary); }

        .tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .bankroll-display { display: flex; align-items: center; gap: 16px; }
        .bankroll-label { font-size: 14px; color: var(--text-secondary); }
        .bankroll-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; }
        .bankroll-value.positive { color: var(--accent-green); }
        .bankroll-value.negative { color: var(--accent-red); }
        .roi-badge { padding: 8px 16px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
        .roi-badge.positive { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
        .roi-badge.negative { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }

        .history-table { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        .history-table table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .history-table th { background: var(--bg-elevated); font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .history-table tr:last-child td { border-bottom: none; }
        .history-table tr:hover { background: var(--bg-elevated); }
        .unit-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .unit-value.positive { color: var(--accent-green); }
        .unit-value.negative { color: var(--accent-red); }

        .empty-state { text-align: center; padding: 48px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 16px; }
            .nav-tabs { width: 100%; justify-content: center; }
            .header-stats { width: 100%; justify-content: space-around; }
            .cards-grid { grid-template-columns: 1fr; }
            .record-main { flex-direction: column; gap: 16px; }
            .streaks-grid { grid-template-columns: 1fr; }
            .tracker-header { flex-direction: column; text-align: center; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .prediction-card { animation: fadeIn 0.3s ease forwards; }
        .prediction-card:nth-child(1) { animation-delay: 0.05s; }
        .prediction-card:nth-child(2) { animation-delay: 0.1s; }
        .prediction-card:nth-child(3) { animation-delay: 0.15s; }
        .prediction-card:nth-child(4) { animation-delay: 0.2s; }
        .prediction-card:nth-child(5) { animation-delay: 0.25s; }
        .prediction-card:nth-child(6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo"><div class="logo-icon">🎯</div><span>BetPredictor</span></div>
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="picks">Today's Picks</button>
                <button class="nav-tab" data-tab="best">Best Bets</button>
                <button class="nav-tab" data-tab="record">Record</button>
                <button class="nav-tab" data-tab="tracker">Tracker</button>
            </nav>
            <div class="header-stats">
                <div class="stat-item"><div class="stat-label">Profit</div><div class="stat-value" id="header-profit">+0.0u</div></div>
                <div class="stat-item"><div class="stat-label">Record</div><div class="stat-value" id="header-record">0-0</div></div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="tab-content active" id="picks-tab">
            <div class="filter-bar">
                <button class="filter-btn active" data-sport="all">All Sports</button>
                <button class="filter-btn" data-sport="NBA">🏀 NBA</button>
                <button class="filter-btn" data-sport="NFL">🏈 NFL</button>
                <button class="filter-btn" data-sport="MLB">⚾ MLB</button>
                <button class="filter-btn" data-sport="NHL">🏒 NHL</button>
                <button class="filter-btn" data-sport="NCAA">🎓 NCAA</button>
            </div>
            <div class="cards-grid" id="picks-grid"></div>
        </div>

        <div class="tab-content" id="best-tab">
            <div class="best-bets-header"><h2>⭐ Best Bets Today</h2></div>
            <div class="cards-grid" id="best-bets-grid"></div>
        </div>

        <div class="tab-content" id="record-tab">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-card-icon">📊</div><div class="stat-card-value" id="total-picks">0</div><div class="stat-card-label">Total Picks</div></div>
                <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value" style="color: var(--accent-green)" id="total-wins">0</div><div class="stat-card-label">Wins</div></div>
                <div class="stat-card"><div class="stat-card-icon">❌</div><div class="stat-card-value" style="color: var(--accent-red)" id="total-losses">0</div><div class="stat-card-label">Losses</div></div>
                <div class="stat-card"><div class="stat-card-icon">🔄</div><div class="stat-card-value" id="total-pushes">0</div><div class="stat-card-label">Pushes</div></div>
            </div>
            <div class="record-card">
                <div class="record-header"><h3 class="record-title">Win/Loss Record</h3></div>
                <div class="record-main">
                    <div class="record-display"><div class="record-wins" id="record-wins">0</div><div class="record-label">Wins</div></div>
                    <div class="record-divider">-</div>
                    <div class="record-display"><div class="record-losses" id="record-losses">0</div><div class="record-label">Losses</div></div>
                    <div class="win-rate-ring">
                        <svg width="120" height="120" viewBox="0 0 120 120">
                            <circle class="bg" cx="60" cy="60" r="52"></circle>
                            <circle class="progress" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73" id="win-rate-circle"></circle>
                        </svg>
                        <div class="win-rate-value"><div class="win-rate-number" id="win-rate">0%</div><div class="win-rate-label">Win Rate</div></div>
                    </div>
                </div>
                <div class="streaks-grid">
                    <div class="streak-item"><div class="streak-value win" id="current-win-streak">0</div><div class="streak-label">Current Win Streak</div></div>
                    <div class="streak-item"><div class="streak-value loss" id="current-loss-streak">0</div><div class="streak-label">Current Loss Streak</div></div>
                    <div class="streak-item"><div class="streak-value win" id="best-win-streak">0</div><div class="streak-label">Best Win Streak</div></div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tracker-tab">
            <div class="tracker-header">
                <div class="bankroll-display"><div><div class="bankroll-label">Total Profit/Loss</div><div class="bankroll-value" id="bankroll-value">+0.0u</div></div></div>
                <div class="roi-badge positive" id="roi-badge">+0.0% ROI</div>
            </div>
            <div class="history-table">
                <table>
                    <thead><tr><th>Date</th><th>Game</th><th>Pick</th><th>Sport</th><th>Result</th><th>Units</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const samplePredictions = [
            { id: '1', sport: 'NBA', homeTeam: 'Lakers', awayTeam: 'Celtics', homeLogo: '🏀', awayLogo: '🏀', pick: 'Lakers -4.5', odds: -110, confidence: 82, startTime: '7:30 PM ET', result: 'pending' },
            { id: '2', sport: 'NFL', homeTeam: 'Chiefs', awayTeam: 'Bills', homeLogo: '🏈', awayLogo: '🏈', pick: 'Chiefs -3.5', odds: -115, confidence: 78, startTime: '8:15 PM ET', result: 'pending' },
            { id: '3', sport: 'NBA', homeTeam: 'Warriors', awayTeam: 'Suns', homeLogo: '🏀', awayLogo: '🏀', pick: 'Suns +6.5', odds: -105, confidence: 71, startTime: '10:00 PM ET', result: 'pending' },
            { id: '4', sport: 'MLB', homeTeam: 'Yankees', awayTeam: 'Red Sox', homeLogo: '⚾', awayLogo: '⚾', pick: 'Yankees -1.5', odds: 120, confidence: 65, startTime: '1:05 PM ET', result: 'pending' },
            { id: '5', sport: 'NHL', homeTeam: 'Avalanche', awayTeam: 'Lightning', homeLogo: '🏒', awayLogo: '🏒', pick: 'Avalanche -1.5', odds: -130, confidence: 74, startTime: '9:00 PM ET', result: 'pending' },
            { id: '6', sport: 'NCAA', homeTeam: 'Duke', awayTeam: 'UNC', homeLogo: '🎓', awayLogo: '🎓', pick: 'Duke -2.5', odds: -110, confidence: 69, startTime: '6:00 PM ET', result: 'pending' },
            { id: '7', sport: 'NBA', homeTeam: 'Heat', awayTeam: 'Knicks', homeLogo: '🏀', awayLogo: '🏀', pick: 'Knicks +5.5', odds: -108, confidence: 58, startTime: '7:30 PM ET', result: 'pending' },
            { id: '8', sport: 'NFL', homeTeam: 'Eagles', awayTeam: 'Cowboys', homeLogo: '🏈', awayLogo: '🏈', pick: 'Eagles -2.5', odds: -120, confidence: 85, startTime: '4:25 PM ET', result: 'pending' }
        ];

        let predictions = JSON.parse(localStorage.getItem('predictions')) || samplePredictions;
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            renderPicks();
            renderBestBets();
            updateStats();
            updateHistory();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
                });
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.sport;
                    renderPicks();
                });
            });
        }

        function renderPicks() {
            const grid = document.getElementById('picks-grid');
            const filtered = currentFilter === 'all' ? predictions : predictions.filter(p => p.sport === currentFilter);
            grid.innerHTML = filtered.map(p => createPredictionCard(p)).join('');
        }

        function renderBestBets() {
            const grid = document.getElementById('best-bets-grid');
            const bestBets = [...predictions].filter(p => p.confidence >= 70).sort((a, b) => b.confidence - a.confidence).slice(0, 3);
            grid.innerHTML = bestBets.length ? bestBets.map(p => createPredictionCard(p, true)).join('') : '<div class="empty-state"><div class="empty-state-icon">🎯</div><p>No best bets available</p></div>';
        }

        function createPredictionCard(prediction, showStars = false) {
            const confidenceClass = prediction.confidence >= 75 ? 'high' : prediction.confidence >= 60 ? 'medium' : 'low';
            const stars = showStars ? getStarRating(prediction.confidence) : '';
            let resultBadge = '', actionButtons = '';
            
            if (prediction.result === 'pending') {
                actionButtons = `
                    <button class="btn btn-win" onclick="markResult('${prediction.id}', 'win')">✓ Win</button>
                    <button class="btn btn-loss" onclick="markResult('${prediction.id}', 'loss')">✗ Loss</button>
                    <button class="btn btn-reset" onclick="markResult('${prediction.id}', 'push')">Push</button>
                `;
            } else {
                resultBadge = `<span class="result-badge ${prediction.result}">${prediction.result.toUpperCase()}</span>`;
                actionButtons = `<button class="btn btn-reset" onclick="resetResult('${prediction.id}')">↺ Reset</button>`;
            }

            return `
                <div class="prediction-card">
                    <div class="card-header">
                        <span class="sport-badge ${prediction.sport.toLowerCase()}">${getSportEmoji(prediction.sport)} ${prediction.sport}</span>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            ${stars}
                            ${resultBadge}
                            <span class="game-time">${prediction.startTime}</span>
                        </div>
                    </div>
                    <div class="matchup">
                        <div class="team"><div class="team-logo">${prediction.awayLogo}</div><span class="team-name">${prediction.awayTeam}</span></div>
                        <span class="vs">vs</span>
                        <div class="team"><div class="team-logo">${prediction.homeLogo}</div><span class="team-name">${prediction.homeTeam}</span></div>
                    </div>
                    <div class="pick-section">
                        <div class="pick-label">Our Pick</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="pick-value">${prediction.pick}</span>
                            <span class="pick-odds">${prediction.odds > 0 ? '+' : ''}${prediction.odds}</span>
                        </div>
                    </div>
                    <div class="confidence-bar"><div class="confidence-fill ${confidenceClass}" style="width: ${prediction.confidence}%"></div></div>
                    <div class="confidence-text"><span>Confidence</span><span>${prediction.confidence}%</span></div>
                    <div class="card-actions" style="margin-top: 16px;">${actionButtons}</div>
                </div>
            `;
        }

        function getSportEmoji(sport) {
            const emojis = { NBA: '🏀', NFL: '🏈', MLB: '⚾', NHL: '🏒', NCAA: '🎓' };
            return emojis[sport] || '🎯';
        }

        function getStarRating(confidence) {
            const stars = Math.round(confidence / 20);
            return '<div class="star-rating">' + Array(5).fill(0).map((_, i) => `<span class="star ${i < stars ? '' : 'empty'}">★</span>`).join('') + '</div>';
        }

        function calculateUnits(odds, result) {
            if (result === 'push') return 0;
            const unit = 1;
            if (odds > 0) return result === 'win' ? (unit * odds / 100) : -unit;
            return result === 'win' ? (unit * 100 / Math.abs(odds)) : -unit;
        }

        function markResult(id, result) {
            const prediction = predictions.find(p => p.id === id);
            if (!prediction) return;
            prediction.result = result;
            prediction.units = calculateUnits(prediction.odds, result);
            savePredictions();
            renderPicks();
            renderBestBets();
            updateStats();
            updateHistory();
        }

        function resetResult(id) {
            const prediction = predictions.find(p => p.id === id);
            if (!prediction) return;
            prediction.result = 'pending';
            delete prediction.units;
            savePredictions();
            renderPicks();
            renderBestBets();
            updateStats();
            updateHistory();
        }

        function savePredictions() {
            localStorage.setItem('predictions', JSON.stringify(predictions));
        }

        function updateStats() {
            const settled = predictions.filter(p => p.result !== 'pending');
            const wins = settled.filter(p => p.result === 'win').length;
            const losses = settled.filter(p => p.result === 'loss').length;
            const pushes = settled.filter(p => p.result === 'push').length;
            const total = wins + losses;
            const winRate = total > 0 ? Math.round((wins / total) * 100) : 0;
            const totalUnits = settled.reduce((sum, p) => sum + (p.units || 0), 0);
            const roi = total > 0 ? ((totalUnits / total) * 100).toFixed(1) : 0;

            const headerProfit = document.getElementById('header-profit');
            headerProfit.textContent = `${totalUnits >= 0 ? '+' : ''}${totalUnits.toFixed(1)}u`;
            headerProfit.className = `stat-value ${totalUnits >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('header-record').textContent = `${wins}-${losses}`;

            document.getElementById('total-picks').textContent = settled.length;
            document.getElementById('total-wins').textContent = wins;
            document.getElementById('total-losses').textContent = losses;
            document.getElementById('total-pushes').textContent = pushes;

            document.getElementById('record-wins').textContent = wins;
            document.getElementById('record-losses').textContent = losses;
            document.getElementById('win-rate').textContent = `${winRate}%`;

            const circle = document.getElementById('win-rate-circle');
            const circumference = 326.73;
            const offset = total > 0 ? circumference - (winRate / 100 * circumference) : circumference;
            circle.style.strokeDashoffset = offset;

            let currentWinStreak = 0, currentLossStreak = 0, bestWinStreak = 0, tempStreak = 0;
            const sorted = [...settled].sort((a, b) => new Date(b.id) - new Date(a.id));
            
            for (const bet of sorted) {
                if (bet.result === 'win') { tempStreak++; if (tempStreak > bestWinStreak) bestWinStreak = tempStreak; }
                else { tempStreak = 0; }
            }
            
            for (let i = sorted.length - 1; i >= 0; i--) {
                if (sorted[i].result === 'win') currentWinStreak++;
                else break;
            }
            for (let i = sorted.length - 1; i >= 0; i--) {
                if (sorted[i].result === 'loss') currentLossStreak++;
                else break;
            }

            document.getElementById('current-win-streak').textContent = currentWinStreak;
            document.getElementById('current-loss-streak').textContent = currentLossStreak;
            document.getElementById('best-win-streak').textContent = bestWinStreak;

            const bankrollEl = document.getElementById('bankroll-value');
            bankrollEl.textContent = `${totalUnits >= 0 ? '+' : ''}${totalUnits.toFixed(1)}u`;
            bankrollEl.className = `bankroll-value ${totalUnits >= 0 ? 'positive' : 'negative'}`;
            
            const roiEl = document.getElementById('roi-badge');
            roiEl.textContent = `${roi >= 0 ? '+' : ''}${roi}% ROI`;
            roiEl.className = `roi-badge ${roi >= 0 ? 'positive' : 'negative'}`;
        }

        function updateHistory() {
            const tbody = document.getElementById('history-body');
            const settled = predictions.filter(p => p.result !== 'pending').sort((a, b) => new Date(b.id) - new Date(a.id));
            
            if (settled.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">No settled bets yet</td></tr>';
                return;
            }

            const today = new Date().toLocaleDateString('en            today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            tbody.innerHTML = settled.map(p => `
                <tr>
                    <td>${today}</td>
                    <td>${p.awayTeam} vs ${p.homeTeam}</td>
                    <td>${p.pick}</td>
                    <td>${p.sport}</td>
                    <td><span class="result-badge ${p.result}">${p.result.toUpperCase()}</span></td>
                    <td><span class="unit-value ${p.units >= 0 ? 'positive' : 'negative'}">${p.units >= 0 ? '+' : ''}${p.units.toFixed(1)}u</span></td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
